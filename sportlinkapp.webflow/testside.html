      <script>
const swipeWrapper = document.querySelector('.swipe-wrapper');
const slides = document.querySelectorAll('.swipe-slide');
let currentIndex = 0;
let startX = 0;
let currentX = 0;
let translateX = 0;
let isDragging = false;
const slideWidth = window.innerWidth; // Bruker full bredde av skjermen
function updateSlidePosition() {
    swipeWrapper.style.transition = 'transform 0.3s ease';
    swipeWrapper.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
}
function goToSlide(index) {
    if (index >= 0 && index < slides.length) {
        currentIndex = index;
        updateSlidePosition();
    }
}
// Håndter touch-start
function handleTouchStart(event) {
    startX = event.touches[0].clientX;
    isDragging = true;
    // Deaktiver overgangseffekten under sveiping
    swipeWrapper.style.transition = 'none';
}
// Håndter touch-move
function handleTouchMove(event) {
    if (!isDragging) return;
    currentX = event.touches[0].clientX;
    const deltaX = currentX - startX;
    // Oppdater posisjonen til wrapperen basert på sveipebevegelsen
    translateX = -currentIndex * slideWidth + deltaX;
    swipeWrapper.style.transform = `translateX(${translateX}px)`;
}
// Håndter touch-end
function handleTouchEnd() {
    if (!isDragging) return;
    const deltaX = currentX - startX;
    const threshold = slideWidth / 4; // Grensen for sveiping
    // Bestem hvilken slide vi skal navigere til basert på sveip
    if (deltaX < -threshold && currentIndex < slides.length - 1) {
        currentIndex++; // Gå til neste slide
    } else if (deltaX > threshold && currentIndex > 0) {
        currentIndex--; // Gå til forrige slide
    }
    // Fullfør animasjonen til nærmeste slide
    updateSlidePosition();
    isDragging = false;
}
// Legg til touch-event listeners
swipeWrapper.addEventListener('touchstart', handleTouchStart);
swipeWrapper.addEventListener('touchmove', handleTouchMove);
swipeWrapper.addEventListener('touchend', handleTouchEnd);
// Navigasjonsknapper for å gå til spesifikke slides
document.getElementById('goToTeams').addEventListener('click', () => goToSlide(0));
document.getElementById('goToMatches').addEventListener('click', () => goToSlide(1));
document.getElementById('goToEndPlay').addEventListener('click', () => goToSlide(2));
// Initial oppdatering av posisjon
updateSlidePosition();
</script>
